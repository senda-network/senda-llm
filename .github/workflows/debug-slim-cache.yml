name: Debug slim cache visibility

# Temporary workflow for proving GitHub Actions cache save/list/restore behavior
# on the same cache path used by the slim llama.cpp lanes.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/debug-slim-cache.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/debug-slim-cache.yml'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Which debug path to run'
        required: true
        type: choice
        options:
          - warm
          - restore
        default: warm

concurrency:
  group: debug-slim-cache-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  CACHE_NAMESPACE: senda
  DEBUG_CACHE_PATH: llama.cpp/build/bin
  DEBUG_CACHE_VERSION: ${{ vars.DEBUG_SLIM_CACHE_VERSION || 'v1' }}
  DEBUG_CACHE_KEY: senda-cache-debug-slim-linux-${{ vars.DEBUG_SLIM_CACHE_VERSION || 'v1' }}-shared

jobs:
  reject-non-main-warm:
    name: Reject non-main warm attempts
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'warm' && github.ref != 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fail warm dispatch outside main
        shell: bash
        run: |
          set -euo pipefail
          echo "ERROR: warm mode is only allowed on refs/heads/main, got ${GITHUB_REF}" >&2
          exit 1

  warm_main_cache:
    name: Warm debug slim cache on main
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.mode == 'warm' && github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Print debug context
        shell: bash
        run: |
          set -euo pipefail
          echo "github.event_name=${GITHUB_EVENT_NAME}"
          echo "github.ref=${GITHUB_REF}"
          echo "github.base_ref=${GITHUB_BASE_REF:-}"
          echo "github.head_ref=${GITHUB_HEAD_REF:-}"
          echo "github.sha=${GITHUB_SHA}"
          echo "github.run_id=${GITHUB_RUN_ID}"
          echo "cache.key=${DEBUG_CACHE_KEY}"
          echo "cache.path=${DEBUG_CACHE_PATH}"
          echo "cache.version.label=${DEBUG_CACHE_VERSION}"

      - name: List cache path before restore
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${DEBUG_CACHE_PATH}"
          ls -lah "${DEBUG_CACHE_PATH}"

      - name: Restore debug slim cache
        id: restore_cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.DEBUG_CACHE_PATH }}
          key: ${{ env.DEBUG_CACHE_KEY }}

      - name: Print restore outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "restore.cache-hit=${{ steps.restore_cache.outputs.cache-hit }}"
          echo "restore.cache-primary-key=${{ steps.restore_cache.outputs.cache-primary-key }}"
          echo "restore.cache-matched-key=${{ steps.restore_cache.outputs.cache-matched-key }}"
          ls -lah "${DEBUG_CACHE_PATH}"
          if [[ -f "${DEBUG_CACHE_PATH}/cache-debug-marker.txt" ]]; then
            echo "marker.contents<<'EOF'"
            cat "${DEBUG_CACHE_PATH}/cache-debug-marker.txt"
            echo "EOF"
          fi

      - name: Write debug marker payload
        if: steps.restore_cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${DEBUG_CACHE_PATH}"
          timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          cat > "${DEBUG_CACHE_PATH}/cache-debug-marker.txt" <<EOF
          writer_event=${GITHUB_EVENT_NAME}
          writer_ref=${GITHUB_REF}
          writer_base_ref=${GITHUB_BASE_REF:-}
          writer_head_ref=${GITHUB_HEAD_REF:-}
          writer_sha=${GITHUB_SHA}
          writer_run_id=${GITHUB_RUN_ID}
          cache_key=${DEBUG_CACHE_KEY}
          cache_path=${DEBUG_CACHE_PATH}
          timestamp=${timestamp}
          EOF
          cat > "${DEBUG_CACHE_PATH}/cache-debug-meta.json" <<EOF
          {
            "event_name": "${GITHUB_EVENT_NAME}",
            "ref": "${GITHUB_REF}",
            "base_ref": "${GITHUB_BASE_REF:-}",
            "head_ref": "${GITHUB_HEAD_REF:-}",
            "sha": "${GITHUB_SHA}",
            "run_id": "${GITHUB_RUN_ID}",
            "cache_key": "${DEBUG_CACHE_KEY}",
            "cache_path": "${DEBUG_CACHE_PATH}",
            "timestamp": "${timestamp}"
          }
          EOF
          ls -lah "${DEBUG_CACHE_PATH}"

      - name: Save debug slim cache
        if: steps.restore_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.DEBUG_CACHE_PATH }}
          key: ${{ steps.restore_cache.outputs.cache-primary-key }}

      - name: Verify debug slim cache write
        if: steps.restore_cache.outputs.cache-hit != 'true'
        id: verify_cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.DEBUG_CACHE_PATH }}
          key: ${{ steps.restore_cache.outputs.cache-primary-key }}
          lookup-only: true
          fail-on-cache-miss: true

      - name: Print verify outputs
        if: steps.restore_cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "verify.cache-hit=${{ steps.verify_cache.outputs.cache-hit }}"
          echo "verify.cache-primary-key=${{ steps.verify_cache.outputs.cache-primary-key }}"
          echo "verify.cache-matched-key=${{ steps.verify_cache.outputs.cache-matched-key }}"

      - name: Inventory debug cache after warm
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          CURRENT_REF: ${{ github.ref }}
        shell: bash
        run: |
          set -euo pipefail

          summarize_json() {
            local label="$1"
            local file="$2"
            python3 -c 'import json, sys; label=sys.argv[1]; path=sys.argv[2]; data=json.load(open(path, "r", encoding="utf-8")); caches=data.get("actions_caches", []); print("[" + label + "] total_count=" + str(data.get("total_count", 0))); [print(json.dumps({"id": cache.get("id"), "key": cache.get("key"), "ref": cache.get("ref"), "created_at": cache.get("created_at"), "last_accessed_at": cache.get("last_accessed_at"), "size_in_bytes": cache.get("size_in_bytes"), "version": cache.get("version")}, sort_keys=True)) for cache in caches]' "$label" "$file"
          }

          query_cache_list() {
            local label="$1"
            local outfile="$2"
            shift 2
            echo "::group::${label}"
            gh api --method GET "/repos/${GH_REPO}/actions/caches" "$@" > "$outfile"
            cat "$outfile"
            summarize_json "$label" "$outfile"
            echo "::endgroup::"
          }

          query_cache_list "exact-key any ref" /tmp/debug-cache-any.json -f key="${DEBUG_CACHE_KEY}" -f per_page=100
          query_cache_list "exact-key refs/heads/main" /tmp/debug-cache-main.json -f key="${DEBUG_CACHE_KEY}" -f ref="refs/heads/main" -f per_page=100
          query_cache_list "exact-key current ref" /tmp/debug-cache-current.json -f key="${DEBUG_CACHE_KEY}" -f ref="${CURRENT_REF}" -f per_page=100

      - name: Assert warm-state expectations
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f "${DEBUG_CACHE_PATH}/cache-debug-marker.txt" ]]; then
            echo "ERROR: expected ${DEBUG_CACHE_PATH}/cache-debug-marker.txt to exist after warm path" >&2
            exit 1
          fi
          grep -Fx "cache_key=${DEBUG_CACHE_KEY}" "${DEBUG_CACHE_PATH}/cache-debug-marker.txt"
          if [[ "${{ steps.restore_cache.outputs.cache-hit }}" == 'true' ]]; then
            echo "Existing debug cache was already warm on main; bump DEBUG_CACHE_VERSION in this workflow for a fresh cold save cycle if needed."
          else
            if [[ "${{ steps.verify_cache.outputs.cache-hit }}" != 'true' ]]; then
              echo "ERROR: lookup-only verification did not report an exact hit after save" >&2
              exit 1
            fi
          fi

  restore_from_pr:
    name: Restore debug slim cache from PR or manual exact-key check
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'restore') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Print debug context
        shell: bash
        run: |
          set -euo pipefail
          echo "github.event_name=${GITHUB_EVENT_NAME}"
          echo "github.ref=${GITHUB_REF}"
          echo "github.base_ref=${GITHUB_BASE_REF:-}"
          echo "github.head_ref=${GITHUB_HEAD_REF:-}"
          echo "github.sha=${GITHUB_SHA}"
          echo "github.run_id=${GITHUB_RUN_ID}"
          echo "cache.key=${DEBUG_CACHE_KEY}"
          echo "cache.path=${DEBUG_CACHE_PATH}"
          echo "cache.version.label=${DEBUG_CACHE_VERSION}"

      - name: List cache path before restore
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${DEBUG_CACHE_PATH}"
          ls -lah "${DEBUG_CACHE_PATH}"

      - name: Inventory debug cache before restore
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          CURRENT_REF: ${{ github.ref }}
        shell: bash
        run: |
          set -euo pipefail

          summarize_json() {
            local label="$1"
            local file="$2"
            python3 -c 'import json, sys; label=sys.argv[1]; path=sys.argv[2]; data=json.load(open(path, "r", encoding="utf-8")); caches=data.get("actions_caches", []); print("[" + label + "] total_count=" + str(data.get("total_count", 0))); [print(json.dumps({"id": cache.get("id"), "key": cache.get("key"), "ref": cache.get("ref"), "created_at": cache.get("created_at"), "last_accessed_at": cache.get("last_accessed_at"), "size_in_bytes": cache.get("size_in_bytes"), "version": cache.get("version")}, sort_keys=True)) for cache in caches]' "$label" "$file"
          }

          query_cache_list() {
            local label="$1"
            local outfile="$2"
            shift 2
            echo "::group::${label}"
            gh api --method GET "/repos/${GH_REPO}/actions/caches" "$@" > "$outfile"
            cat "$outfile"
            summarize_json "$label" "$outfile"
            echo "::endgroup::"
          }

          query_cache_list "exact-key any ref" /tmp/debug-cache-any.json -f key="${DEBUG_CACHE_KEY}" -f per_page=100
          query_cache_list "exact-key refs/heads/main" /tmp/debug-cache-main.json -f key="${DEBUG_CACHE_KEY}" -f ref="refs/heads/main" -f per_page=100
          query_cache_list "exact-key current ref" /tmp/debug-cache-current.json -f key="${DEBUG_CACHE_KEY}" -f ref="${CURRENT_REF}" -f per_page=100

      - name: Assert inventory expectations before restore
        shell: bash
        run: |
          set -euo pipefail
          python3 -c 'import json; main_data=json.load(open("/tmp/debug-cache-main.json", "r", encoding="utf-8")); current_data=json.load(open("/tmp/debug-cache-current.json", "r", encoding="utf-8")); main_count=int(main_data.get("total_count", 0) or 0); current_count=int(current_data.get("total_count", 0) or 0); print(f"main_inventory_count={main_count}"); print(f"current_ref_inventory_count={current_count}"); raise SystemExit("ERROR: expected at least one exact-key cache on refs/heads/main before restore") if main_count < 1 else None'

      - name: Clarify restore proof mode
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "Proof mode: PR fallback from main cache scope"
          else
            echo "Proof mode: manual exact-key restore only; this does not prove pull_request fallback semantics"
          fi

      - name: Restore debug slim cache from exact key
        id: restore_cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.DEBUG_CACHE_PATH }}
          key: ${{ env.DEBUG_CACHE_KEY }}
          fail-on-cache-miss: true

      - name: Print restore outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "restore.cache-hit=${{ steps.restore_cache.outputs.cache-hit }}"
          echo "restore.cache-primary-key=${{ steps.restore_cache.outputs.cache-primary-key }}"
          echo "restore.cache-matched-key=${{ steps.restore_cache.outputs.cache-matched-key }}"

      - name: List cache path after restore
        shell: bash
        run: |
          set -euo pipefail
          ls -lah "${DEBUG_CACHE_PATH}"

      - name: Validate restored marker
        shell: bash
        run: |
          set -euo pipefail
          marker="${DEBUG_CACHE_PATH}/cache-debug-marker.txt"
          meta="${DEBUG_CACHE_PATH}/cache-debug-meta.json"

          if [[ "${{ steps.restore_cache.outputs.cache-hit }}" != 'true' ]]; then
            echo "ERROR: expected an exact cache hit for ${DEBUG_CACHE_KEY}" >&2
            exit 1
          fi

          if [[ "${{ steps.restore_cache.outputs.cache-matched-key }}" != "${DEBUG_CACHE_KEY}" ]]; then
            echo "ERROR: restore matched ${{ steps.restore_cache.outputs.cache-matched-key }} instead of ${DEBUG_CACHE_KEY}" >&2
            exit 1
          fi

          if [[ ! -f "$marker" ]]; then
            echo "ERROR: restored marker file missing: $marker" >&2
            exit 1
          fi

          if [[ ! -f "$meta" ]]; then
            echo "ERROR: restored metadata file missing: $meta" >&2
            exit 1
          fi

          grep -Fx "writer_ref=refs/heads/main" "$marker"
          grep -Fx "cache_key=${DEBUG_CACHE_KEY}" "$marker"

          echo "marker.contents<<'EOF'"
          cat "$marker"
          echo "EOF"
          echo "meta.contents<<'EOF'"
          cat "$meta"
          echo "EOF"
