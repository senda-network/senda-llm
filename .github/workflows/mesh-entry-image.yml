name: mesh-entry-image

# Standalone workflow for the always-on senda "mesh-entry" runtime
# (the public Lightsail / Fly / VPS box that fronts senda.network).
#
# Builds docker/Dockerfile.client (CPU-only client/console image — no llama
# binaries, no GPU) and publishes to GHCR so the entry box just runs
# `docker pull` instead of compiling Rust on a 1-vCPU instance for two
# hours every redeploy.
#
# Trigger via:
#   gh workflow run mesh-entry-image.yml --ref <branch>

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile.client'
      - 'docker/entrypoint.sh'
      - 'docker/Caddyfile'
      - 'senda/**'
      - 'senda-client/**'
      - 'mesh-api/**'
      - 'mesh-host-core/**'
      - 'mesh-api-ffi/**'
      - 'tools/xtask/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/mesh-entry-image.yml'

concurrency:
  group: mesh-entry-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: senda-network/senda-llm/mesh-entry

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.client
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=mesh-entry-amd64
          cache-to: type=gha,mode=max,scope=mesh-entry-amd64
