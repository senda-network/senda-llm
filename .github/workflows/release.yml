name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, with or without a leading v
        required: true
        type: string
      prerelease:
        description: Mark this as a prerelease and allow releasing from a non-main branch
        required: true
        default: false
        type: boolean
      skip_gpu_bundles:
        description: For prereleases only, skip the Linux CUDA, ROCm, and Vulkan release bundles
        required: true
        default: false
        type: boolean
      target_branch:
        description: Branch to release from
        required: true
        default: main
        type: string

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  CACHE_NAMESPACE: senda
  SCCACHE_GHA_ENABLED: "true"

jobs:
  prepare_release:
    name: Prepare release commit and tag
    runs-on: macos-14
    outputs:
      tag: ${{ steps.release_meta.outputs.tag }}
      version: ${{ steps.release_meta.outputs.version }}
      prerelease: ${{ steps.release_meta.outputs.prerelease }}
      skip_gpu_bundles: ${{ steps.release_meta.outputs.skip_gpu_bundles }}
      target_branch: ${{ steps.release_meta.outputs.target_branch }}
      release_sha: ${{ steps.release_commit.outputs.release_sha }}

    steps:
      - name: Normalize release metadata
        id: release_meta
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          INPUT_SKIP_GPU_BUNDLES: ${{ inputs.skip_gpu_bundles }}
          INPUT_TARGET_BRANCH: ${{ inputs.target_branch }}
        shell: bash
        run: |
          set -euo pipefail

          version="${INPUT_VERSION#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $INPUT_VERSION" >&2
            exit 1
          fi

          tag="v$version"
          prerelease="${INPUT_PRERELEASE}"
          skip_gpu_bundles="${INPUT_SKIP_GPU_BUNDLES}"
          target_branch="${INPUT_TARGET_BRANCH}"

          if [[ "$prerelease" != "true" && "$prerelease" != "false" ]]; then
            echo "Invalid prerelease flag: $prerelease" >&2
            exit 1
          fi

          if [[ "$skip_gpu_bundles" != "true" && "$skip_gpu_bundles" != "false" ]]; then
            echo "Invalid skip_gpu_bundles flag: $skip_gpu_bundles" >&2
            exit 1
          fi

          if [[ -z "$target_branch" || "$target_branch" == refs/* ]]; then
            echo "target_branch must be a plain branch name under origin/ (got: $target_branch)" >&2
            exit 1
          fi

          if ! git check-ref-format --branch "$target_branch" >/dev/null 2>&1; then
            echo "Invalid branch name: $target_branch" >&2
            exit 1
          fi

          if [[ "$prerelease" == "false" && "$target_branch" != "main" ]]; then
            echo "Stable releases must target main (got: $target_branch)" >&2
            exit 1
          fi

          if [[ "$prerelease" == "false" && "$tag" == *-* ]]; then
            echo "Stable releases must not use prerelease semver tags (got: $tag)" >&2
            exit 1
          fi

          if [[ "$prerelease" == "true" && "$tag" != *-* ]]; then
            echo "Prereleases must include a semver prerelease suffix such as -rc.1 (got: $tag)" >&2
            exit 1
          fi

          if [[ "$prerelease" == "false" && "$skip_gpu_bundles" == "true" ]]; then
            echo "Stable releases must build the Linux CUDA, ROCm, and Vulkan bundles" >&2
            exit 1
          fi

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "prerelease=$prerelease"
            echo "skip_gpu_bundles=$skip_gpu_bundles"
            echo "target_branch=$target_branch"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.release_meta.outputs.target_branch }}
          fetch-depth: 0

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            senda/ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify release invariants
        run: just check-release

      - name: Ensure target branch exists on origin
        shell: bash
        run: |
          set -euo pipefail
          if ! git show-ref --verify --quiet "refs/remotes/origin/${{ steps.release_meta.outputs.target_branch }}"; then
            echo "target_branch must resolve to a remote branch under origin/ (got: ${{ steps.release_meta.outputs.target_branch }})" >&2
            exit 1
          fi

      - name: Ensure release tag does not already exist
        env:
          TAG: ${{ steps.release_meta.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag already exists locally: $TAG" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag already exists on origin: $TAG" >&2
            exit 1
          fi

      - name: Create release commit and tag
        id: release_commit
        env:
          TAG: ${{ steps.release_meta.outputs.tag }}
          TARGET_BRANCH: ${{ steps.release_meta.outputs.target_branch }}
          PRERELEASE: ${{ steps.release_meta.outputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$TARGET_BRANCH" "origin/$TARGET_BRANCH"

          scripts/release-version.sh "$TAG"
          scripts/prepare-swift-package-release.sh "$TAG"
          swift package dump-package >/dev/null
          git add -A

          if git diff --cached --quiet; then
            echo "Release version update produced no changes for $TAG" >&2
            exit 1
          fi

          if [[ "$PRERELEASE" == "true" ]]; then
            git commit -m "$TAG: prerelease"
          else
            git commit -m "$TAG: release"
          fi

          git tag "$TAG"
          git push origin "HEAD:$TARGET_BRANCH"
          git push origin "$TAG"

          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload Swift package release artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-swift-package
          path: dist/SendaFFI.xcframework.zip
          if-no-files-found: error

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: prepare_release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux CPU
            os: ubuntu-latest
            artifact_name: release-linux-cpu
            senda_flavor: cpu
          - name: macOS
            os: macos-14
            artifact_name: release-macos
            senda_flavor: metal

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare_release.outputs.release_sha }}

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            senda/ui/package-lock.json

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Build release bundle
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare_release.outputs.tag }}
        run: |
          just --shell bash --shell-arg -lc release-build
          just --shell bash --shell-arg -lc release-bundle "$RELEASE_TAG" dist

      - name: Package senda installer artifact
        shell: bash
        env:
          MESH_RELEASE_FLAVOR: ${{ matrix.senda_flavor }}
        run: |
          chmod +x scripts/release-senda.sh
          scripts/release-senda.sh dist

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

      - name: Upload Linux inference binaries
        if: matrix.name == 'Linux CPU'
        uses: actions/upload-artifact@v6
        with:
          name: ci-linux-release-inference-binaries
          path: |
            target/release/senda
            llama.cpp/build/bin/rpc-server
            llama.cpp/build/bin/llama-server
            llama.cpp/build/bin/llama-moe-analyze
            llama.cpp/build/bin/llama-moe-split
          if-no-files-found: error

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  inference_smoke_tests:
    needs:
      - prepare_release
      - build
    uses: ./.github/workflows/smoke.yml
    with:
      artifact_name: ci-linux-release-inference-binaries
      mesh_binary_target: target/release/senda
      cache_key_prefix: 'release-'
      workflow_cache_file: .github/workflows/release.yml

  build_linux_arm64:
    name: Build Linux ARM64 CPU
    runs-on: ubuntu-24.04-arm
    needs: prepare_release

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare_release.outputs.release_sha }}

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            senda/ui/package-lock.json

      - name: Install system dependencies (Linux ARM64)
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Build ARM64 CPU release bundle
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare_release.outputs.tag }}
        run: |
          just --shell bash --shell-arg -lc release-build-arm64
          just --shell bash --shell-arg -lc release-bundle-arm64 "$RELEASE_TAG" dist

      - name: Package senda installer artifacts (Linux ARM64)
        shell: bash
        run: |
          chmod +x scripts/release-senda.sh
          # The senda binary itself is flavor-agnostic (it spawns
          # llama-server / rpc-server which are flavor-specific). Ship one
          # tarball per supported runtime flavor for ARM64 so the installer
          # can pick the right autoupdate bundle.
          MESH_RELEASE_FLAVOR=cpu    scripts/release-senda.sh dist
          MESH_RELEASE_FLAVOR=vulkan scripts/release-senda.sh dist

      - name: Upload ARM64 CPU release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-linux-arm64
          path: dist/*
          if-no-files-found: error

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  build_linux_cuda:
    name: Build Linux CUDA
    if: ${{ needs.prepare_release.outputs.skip_gpu_bundles != 'true' }}
    runs-on: ubuntu-latest
    needs: prepare_release
    # Container jobs need explicit cache API scope for mozilla-actions/sccache-action.
    permissions:
      contents: read
      actions: write
    container:
      image: nvidia/cuda:${{ vars.CUDA_VERSION || '12.8.0' }}-devel-ubuntu22.04

    steps:
      - name: Install base packages
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            python3
          rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare_release.outputs.release_sha }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            senda/ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@just

      - uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Build CUDA release bundle
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare_release.outputs.tag }}
        run: |
          just --shell bash --shell-arg -lc release-build-cuda
          just --shell bash --shell-arg -lc release-bundle-cuda "$RELEASE_TAG" dist

      - name: Package senda installer artifact (Linux x86_64 CUDA)
        shell: bash
        env:
          MESH_RELEASE_FLAVOR: cuda
        run: |
          chmod +x scripts/release-senda.sh
          scripts/release-senda.sh dist

      - name: Upload CUDA release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-linux-cuda
          path: dist/*
          if-no-files-found: error

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  build_linux_rocm:
    name: Build Linux ROCm
    if: ${{ needs.prepare_release.outputs.skip_gpu_bundles != 'true' }}
    runs-on: ubuntu-latest
    needs: prepare_release
    container:
      image: rocm/dev-ubuntu-24.04:7.0-complete

    steps:
      - name: Install base packages
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            python3
          rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare_release.outputs.release_sha }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            senda/ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@just

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Build ROCm release bundle
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare_release.outputs.tag }}
        run: |
          just --shell bash --shell-arg -lc release-build-rocm
          just --shell bash --shell-arg -lc release-bundle-rocm "$RELEASE_TAG" dist

      - name: Package senda installer artifact (Linux x86_64 ROCm)
        shell: bash
        env:
          MESH_RELEASE_FLAVOR: rocm
        run: |
          chmod +x scripts/release-senda.sh
          scripts/release-senda.sh dist

      - name: Upload ROCm release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-linux-rocm
          path: dist/*
          if-no-files-found: error

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  build_linux_vulkan:
    name: Build Linux Vulkan
    if: ${{ needs.prepare_release.outputs.skip_gpu_bundles != 'true' }}
    runs-on: ubuntu-latest
    needs: prepare_release

    steps:
      - name: Install Vulkan build packages
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            libvulkan-dev \
            glslc \
            spirv-headers \
            python3
          sudo rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare_release.outputs.release_sha }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            senda/ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@just

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Build Vulkan release bundle
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare_release.outputs.tag }}
        run: |
          just --shell bash --shell-arg -lc release-build-vulkan
          just --shell bash --shell-arg -lc release-bundle-vulkan "$RELEASE_TAG" dist

      - name: Package senda installer artifact (Linux x86_64 Vulkan)
        shell: bash
        env:
          MESH_RELEASE_FLAVOR: vulkan
        run: |
          chmod +x scripts/release-senda.sh
          scripts/release-senda.sh dist

      - name: Upload Vulkan release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-linux-vulkan
          path: dist/*
          if-no-files-found: error

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  # Windows: build senda.exe AND patched llama.cpp helpers
  # (rpc-server.exe, llama-server.exe, llama-moe-{analyze,split}.exe)
  # from source on every release. Pre-0.66.10 we used to download
  # ggml-org/llama.cpp's upstream Windows release for rpc-server /
  # llama-server, but that bundle is missing every Senda patch
  # (--gguf, --mesh-port, the moe tools), so compound-RAM MoE serving
  # was structurally broken on Windows. Compiling from source via the
  # same scripts/build-windows.ps1 used by `just release-build-*-windows`
  # gives us a fully patched, self-contained bundle.
  build_windows:
    name: Build Windows ${{ matrix.flavor_label }}
    if: ${{ needs.prepare_release.outputs.skip_gpu_bundles != 'true' }}
    # Pinned to windows-2022: windows-latest migrated to windows-2025, whose
    # MSVC toolset is newer than CUDA 12.4.1 accepts (host_config.h C1189).
    runs-on: windows-2022
    needs: prepare_release
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: cuda
            flavor_label: CUDA
            artifact_name: release-windows-cuda
            cuda_version: "12.4.1"
            cuda_arch: "89"

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare_release.outputs.release_sha }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Install CUDA toolkit ${{ matrix.cuda_version }}
        if: matrix.flavor == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: ${{ matrix.cuda_version }}
          method: network
          sub-packages: '["nvcc","cudart","visual_studio_integration","cublas","cublas_dev","thrust","cuda_profiler_api","nvtx"]'

      - name: Build senda.exe + patched llama.cpp (${{ matrix.flavor_label }})
        shell: pwsh
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: "4"
        run: ./scripts/build-windows.ps1 -Backend ${{ matrix.flavor }} -CudaArch '${{ matrix.cuda_arch }}'

      - name: Package senda installer artifact (Windows x86_64 ${{ matrix.flavor_label }})
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          ./scripts/release-senda.ps1 -Flavor ${{ matrix.flavor }} -OutputDir dist

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: ${{ always() && needs.prepare_release.result == 'success' && needs.build.result == 'success' && needs.build_linux_arm64.result == 'success' && needs.inference_smoke_tests.result == 'success' && (needs.build_linux_cuda.result == 'success' || needs.build_linux_cuda.result == 'skipped') && (needs.build_linux_rocm.result == 'success' || needs.build_linux_rocm.result == 'skipped') && (needs.build_linux_vulkan.result == 'success' || needs.build_linux_vulkan.result == 'skipped') && (needs.build_windows.result == 'success' || needs.build_windows.result == 'skipped') }}
    runs-on: ubuntu-latest
    needs:
      - prepare_release
      - build
      - build_linux_arm64
      - build_linux_cuda
      - build_linux_rocm
      - build_linux_vulkan
      - build_windows
      - inference_smoke_tests

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare_release.outputs.tag }}
          PRERELEASE: ${{ needs.prepare_release.outputs.prerelease }}
        shell: bash
        run: |
          shopt -s nullglob
          files=(dist/*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found under dist/"
            exit 1
          fi

          release_args=(--repo "$GH_REPO")
          if [[ "$PRERELEASE" == "true" ]]; then
            release_args+=(--prerelease --latest=false)
          fi

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            if [[ "$PRERELEASE" == "true" ]]; then
              gh release edit "$RELEASE_TAG" --repo "$GH_REPO" --prerelease --latest=false
            fi
            gh release upload "$RELEASE_TAG" "${files[@]}" --repo "$GH_REPO" --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" "${release_args[@]}" --generate-notes
          fi


  publish_android_maven:
    name: Publish Android Maven package
    runs-on: ubuntu-latest
    needs:
      - prepare_release
      - publish

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare_release.outputs.release_sha }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Android Rust targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install --locked cargo-ndk

      - uses: android-actions/setup-android@v3

      - name: Install Android NDK
        shell: bash
        run: |
          set -euo pipefail

          NDK_VERSION="$(tr -d '\n' < sdk/kotlin/ndk-version.txt)"
          printf 'y\ny\ny\ny\ny\ny\ny\ny\ny\ny\n' | sdkmanager --licenses >/dev/null
          sdkmanager "ndk;$NDK_VERSION"

          {
            echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
            echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          } >> "$GITHUB_ENV"

      - name: Publish Android AAR to GitHub Packages
        working-directory: sdk/kotlin
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
        run: ./gradlew --no-daemon publishAarPublicationToGitHubPackagesRepository

  reset_swift_package_manifest:
    name: Reset Swift package manifest placeholders
    runs-on: ubuntu-latest
    needs:
      - prepare_release
      - publish
      - publish_android_maven
    if: always() && needs.prepare_release.result == 'success' && needs.publish.result == 'success' && (needs.publish_android_maven.result == 'success' || needs.publish_android_maven.result == 'skipped')

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare_release.outputs.target_branch }}
          fetch-depth: 0

      - name: Reset Package.swift placeholders
        env:
          TAG: ${{ needs.prepare_release.outputs.tag }}
          TARGET_BRANCH: ${{ needs.prepare_release.outputs.target_branch }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
          scripts/reset-swift-package-manifest.sh

          if git diff --quiet -- Package.swift; then
            echo "Package.swift already reset"
            exit 0
          fi

          git add Package.swift
          git commit -m "chore: reset swift package manifest after $TAG"
          git push origin "HEAD:$TARGET_BRANCH"
