name: Llama Upstream Canary

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      upstream_sha:
        description: "Optional llama.cpp upstream SHA to validate instead of origin/master"
        required: false
        default: ""

concurrency:
  group: llama-upstream-canary
  cancel-in-progress: false

permissions:
  contents: write

env:
  CACHE_NAMESPACE: senda
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  latest_upstream:
    runs-on: ubuntu-latest
    outputs:
      old_sha: ${{ steps.sha.outputs.old_sha }}
      new_sha: ${{ steps.sha.outputs.new_sha }}
      changed: ${{ steps.sha.outputs.changed }}
      patch_status: ${{ steps.patches.outputs.status }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Resolve requested llama upstream (no patches)
        env:
          UPSTREAM_SHA: ${{ github.event.inputs.upstream_sha || 'latest' }}
          LLAMA_SKIP_PATCHES: "1"
        run: scripts/prepare-llama.sh "$UPSTREAM_SHA"

      - name: Capture upstream SHAs
        id: sha
        run: |
          old_sha="$(tr -d '[:space:]' < third_party/llama.cpp/upstream.txt)"
          new_sha="$(tr -d '[:space:]' < .deps/llama.cpp/.git/senda-upstream-sha)"
          echo "old_sha=$old_sha" >> "$GITHUB_OUTPUT"
          echo "new_sha=$new_sha" >> "$GITHUB_OUTPUT"
          if [[ "$old_sha" == "$new_sha" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Show no-change summary
        if: steps.sha.outputs.changed == 'false'
        run: |
          {
            echo "## llama.cpp upstream pin update"
            echo
            echo "Pinned llama.cpp upstream is already current: \`${{ steps.sha.outputs.old_sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # Apply mesh patches against the new upstream. Patch drift is an *expected*
      # signal — it means upstream churn invalidated one of our patches and we
      # need to rebase. Surface that loudly via Step Summary + a GitHub warning
      # annotation, but keep the workflow conclusion green so the dashboard
      # only goes red on real pipeline regressions.
      - name: Apply mesh patches (drift = soft alert)
        id: patches
        if: steps.sha.outputs.changed == 'true'
        run: |
          set +e
          scripts/prepare-llama.sh "${{ steps.sha.outputs.new_sha }}" 2>&1 | tee /tmp/patch.log
          rc=${PIPESTATUS[0]}
          set -e
          if [[ $rc -eq 0 ]]; then
            echo "status=applied" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "status=drift" >> "$GITHUB_OUTPUT"
          drift_excerpt=$(grep -E "^Patch failed at|^error:|^hint:" /tmp/patch.log | head -6)
          {
            echo "## ⚠️  llama.cpp patch drift detected"
            echo
            echo "Upstream moved \`${{ steps.sha.outputs.old_sha }}\` → \`${{ steps.sha.outputs.new_sha }}\`."
            echo "One or more senda patches no longer apply on the latest upstream."
            echo
            echo "### Failure excerpt"
            echo '```'
            echo "$drift_excerpt"
            echo '```'
            echo
            echo "### Next step"
            echo "Reproduce locally with \`scripts/prepare-llama.sh latest\`, then rebase the affected patch in \`third_party/llama.cpp/patches/\`."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::warning title=llama.cpp patch drift::Mesh patches no longer apply on upstream ${{ steps.sha.outputs.new_sha }} — please rebase patches in third_party/llama.cpp/patches/."

  linux_build:
    needs: latest_upstream
    if: needs.latest_upstream.outputs.changed == 'true' && needs.latest_upstream.outputs.patch_status == 'applied'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            .github/cache-version.txt
            ci/requirements-ci-python.txt

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build build-essential libdbus-1-dev

      - name: Install Python SDKs
        run: python -m pip install --upgrade pip -r ci/requirements-ci-python.txt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check release-target repo consistency
        run: cargo run -p xtask -- repo-consistency release-targets

      - name: Check embedded client dependency purity
        run: |
          cargo tree -p senda-client --prefix=none --no-dedupe > /tmp/mesh-client-deps.txt
          FORBIDDEN="keyring|rpassword|hf-hub|dirs|clap|include_dir|rmcp|keyring-core"
          if grep -E "^[[:space:]│├└─-]*($FORBIDDEN)([[:space:]]|$)" /tmp/mesh-client-deps.txt; then
            echo "ERROR: Forbidden dependency found in mesh-client"
            grep -E "^[[:space:]│├└─-]*($FORBIDDEN)([[:space:]]|$)" /tmp/mesh-client-deps.txt
            exit 1
          fi
          echo "PASS: No forbidden dependencies found"

      - name: Build senda binary (debug)
        run: cargo build -p senda --bin senda

      - name: Unit tests
        run: cargo test --lib --tests

      - name: Protocol compatibility matrix
        run: |
          cargo test -p senda --test protocol_compat_v0_client
          cargo test -p senda --test protocol_convert_matrix

      - name: Prepare patched latest llama.cpp
        run: scripts/prepare-llama.sh "${{ needs.latest_upstream.outputs.new_sha }}"

      - name: Build llama.cpp (CPU + RPC)
        run: |
          CACHE_FLAGS=()
          if command -v sccache >/dev/null 2>&1; then
            CACHE_FLAGS+=(
              -DCMAKE_C_COMPILER_LAUNCHER=sccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
            )
          fi
          cmake -B llama.cpp/build -S llama.cpp \
            -DGGML_METAL=OFF \
            -DGGML_CUDA=OFF \
            -DGGML_NATIVE=OFF \
            -DGGML_RPC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_OPENSSL=OFF \
            "${CACHE_FLAGS[@]}"
          cmake --build llama.cpp/build --config Release -j$(nproc) --target rpc-server llama-server llama-moe-analyze llama-moe-split

      - name: CLI smoke test
        run: |
          target/debug/senda --version
          target/debug/senda --help | head -5

      - name: Client-auto boot test
        run: scripts/ci-client-auto-test.sh target/debug/senda

      - name: Upload Linux inference binaries
        uses: actions/upload-artifact@v6
        with:
          name: llama-canary-linux-inference-binaries
          path: |
            target/debug/senda
            llama.cpp/build/bin/rpc-server
            llama.cpp/build/bin/llama-server
            llama.cpp/build/bin/llama-moe-analyze
            llama.cpp/build/bin/llama-moe-split
          if-no-files-found: error

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  inference_smoke_tests:
    needs: [latest_upstream, linux_build]
    if: needs.latest_upstream.outputs.changed == 'true' && needs.latest_upstream.outputs.patch_status == 'applied' && needs.linux_build.result == 'success'
    uses: ./.github/workflows/smoke.yml
    with:
      artifact_name: llama-canary-linux-inference-binaries
      mesh_binary_target: target/debug/senda
      cache_key_prefix: llama-canary-
      workflow_cache_file: .github/workflows/llama-upstream-canary.yml
      runs_on: '"ubuntu-latest"'

  update_main_pin:
    needs: [latest_upstream, linux_build, inference_smoke_tests]
    if: needs.latest_upstream.outputs.changed == 'true' && needs.latest_upstream.outputs.patch_status == 'applied' && needs.linux_build.result == 'success' && needs.inference_smoke_tests.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Check out latest main
        run: |
          git fetch origin main
          git checkout -B main origin/main

      - name: Prepare validated llama upstream
        run: scripts/prepare-llama.sh "${{ needs.latest_upstream.outputs.new_sha }}"

      - name: Update llama upstream pin
        run: just llama-update-pin

      - name: Generate update summary
        run: |
          just llama-summary \
            "${{ needs.latest_upstream.outputs.old_sha }}" \
            "${{ needs.latest_upstream.outputs.new_sha }}" \
            > /tmp/llama-upstream-summary.md

      - name: Commit and push pin update to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add third_party/llama.cpp/upstream.txt LLAMA_CPP_SHA
          if git diff --cached --quiet; then
            echo "No upstream pin changes to commit."
            {
              echo "## llama.cpp upstream pin update"
              echo
              echo "No pin changes were present after validation."
              echo
              cat /tmp/llama-upstream-summary.md
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git commit -m "Update llama.cpp upstream pin"
          git push origin HEAD:main

          {
            echo "## llama.cpp upstream pin update"
            echo
            echo "Updated \`main\` directly with commit \`$(git rev-parse --short HEAD)\`."
            echo
            cat /tmp/llama-upstream-summary.md
          } >> "$GITHUB_STEP_SUMMARY"
