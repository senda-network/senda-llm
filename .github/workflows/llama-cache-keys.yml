name: Resolve llama.cpp cache keys

on:
  workflow_call:
    outputs:
      cache_namespace:
        description: Shared cache namespace for llama.cpp artifacts
        value: ${{ jobs.resolve.outputs.cache_namespace }}
      cuda_version:
        description: CUDA version fragment used in cache keys and image tags
        value: ${{ jobs.resolve.outputs.cuda_version }}
      sha:
        description: Resolved llama.cpp upstream SHA
        value: ${{ jobs.resolve.outputs.sha }}
      cuda_cache_inputs_hash:
        description: Hash of repo inputs that affect CUDA cache artifacts
        value: ${{ jobs.resolve.outputs.cuda_cache_inputs_hash }}
      rocm_cache_inputs_hash:
        description: Hash of repo inputs that affect ROCm cache artifacts
        value: ${{ jobs.resolve.outputs.rocm_cache_inputs_hash }}
      cuda_slim_cache_key:
        description: Exact slim CUDA cache key
        value: ${{ jobs.resolve.outputs.cuda_slim_cache_key }}
      cuda_fat_cache_key:
        description: Exact fat CUDA cache key
        value: ${{ jobs.resolve.outputs.cuda_fat_cache_key }}
      rocm_slim_cache_key:
        description: Exact slim ROCm cache key
        value: ${{ jobs.resolve.outputs.rocm_slim_cache_key }}
      rocm_fat_cache_key:
        description: Exact fat ROCm cache key
        value: ${{ jobs.resolve.outputs.rocm_fat_cache_key }}

permissions:
  contents: read

env:
  CACHE_NAMESPACE: senda

jobs:
  resolve:
    name: Resolve llama.cpp cache keys
    runs-on: ubuntu-latest
    outputs:
      cache_namespace: ${{ steps.cache_namespace.outputs.value }}
      cuda_version: ${{ steps.cuda_version.outputs.value }}
      sha: ${{ steps.resolve.outputs.sha }}
      cuda_cache_inputs_hash: ${{ steps.cache_inputs.outputs.cuda_hash }}
      rocm_cache_inputs_hash: ${{ steps.cache_inputs.outputs.rocm_hash }}
      cuda_slim_cache_key: ${{ steps.render.outputs.cuda_slim_cache_key }}
      cuda_fat_cache_key: ${{ steps.render.outputs.cuda_fat_cache_key }}
      rocm_slim_cache_key: ${{ steps.render.outputs.rocm_slim_cache_key }}
      rocm_fat_cache_key: ${{ steps.render.outputs.rocm_fat_cache_key }}

    steps:
      - uses: actions/checkout@v5

      - name: Expose cache namespace
        id: cache_namespace
        shell: bash
        run: |
          echo "value=${CACHE_NAMESPACE}" >> "$GITHUB_OUTPUT"

      - name: Expose CUDA version
        id: cuda_version
        shell: bash
        run: echo "value=${{ vars.CUDA_VERSION || '12.8.0' }}" >> "$GITHUB_OUTPUT"

      - name: Resolve llama.cpp SHA
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          # Read pinned upstream SHA from the patch-queue pin.
          # Falls back to LLAMA_CPP_SHA during the transition, then upstream.
          if [[ -f third_party/llama.cpp/upstream.txt ]]; then
            SHA=$(tr -d '[:space:]' < third_party/llama.cpp/upstream.txt)
            echo "Using pinned llama.cpp upstream SHA from patch queue: $SHA"
          elif [[ -f LLAMA_CPP_SHA ]]; then
            SHA=$(tr -d '[:space:]' < LLAMA_CPP_SHA)
            echo "Using pinned llama.cpp upstream SHA from LLAMA_CPP_SHA: $SHA"
          else
            SHA=$(git ls-remote https://github.com/ggml-org/llama.cpp.git refs/heads/master | cut -f1)
            echo "llama.cpp pin not found, resolved from upstream remote: $SHA"
          fi
          if [[ -z "$SHA" ]]; then
            echo "Failed to resolve llama.cpp SHA" >&2
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Hash cache-key inputs
        id: cache_inputs
        shell: bash
        run: |
          set -euo pipefail
          echo "cuda_hash=${{ hashFiles('scripts/build-linux.sh', 'Justfile', '.github/workflows/ci.yml', '.github/workflows/warm-caches.yml', '.github/workflows/gpu-warm-cache-job.yml', '.github/workflows/llama-cache-keys.yml', '.github/cache-version.txt') }}" >> "$GITHUB_OUTPUT"
          echo "rocm_hash=${{ hashFiles('scripts/build-linux-rocm.sh', 'Justfile', '.github/workflows/ci.yml', '.github/workflows/warm-caches.yml', '.github/workflows/gpu-warm-cache-job.yml', '.github/workflows/llama-cache-keys.yml', '.github/cache-version.txt') }}" >> "$GITHUB_OUTPUT"

      - name: Render cache keys
        id: render
        shell: bash
        env:
          CACHE_NAMESPACE: ${{ steps.cache_namespace.outputs.value }}
          CUDA_VERSION: ${{ steps.cuda_version.outputs.value }}
          LLAMA_SHA: ${{ steps.resolve.outputs.sha }}
          CUDA_HASH: ${{ steps.cache_inputs.outputs.cuda_hash }}
          ROCM_HASH: ${{ steps.cache_inputs.outputs.rocm_hash }}
        run: |
          set -euo pipefail
          echo "cuda_slim_cache_key=${CACHE_NAMESPACE}-llama-cuda-slim-${LLAMA_SHA}-${CUDA_HASH}-arch89-fa-off-cuda${CUDA_VERSION}" >> "$GITHUB_OUTPUT"
          echo "cuda_fat_cache_key=${CACHE_NAMESPACE}-llama-cuda-fat-${LLAMA_SHA}-${CUDA_HASH}-arch75-80-86-89-90-120-fa-on-cuda${CUDA_VERSION}" >> "$GITHUB_OUTPUT"
          echo "rocm_slim_cache_key=${CACHE_NAMESPACE}-llama-rocm-slim-${LLAMA_SHA}-${ROCM_HASH}-gfx1100-rocm7.0" >> "$GITHUB_OUTPUT"
          echo "rocm_fat_cache_key=${CACHE_NAMESPACE}-llama-rocm-fat-${LLAMA_SHA}-${ROCM_HASH}-gfx90a-gfx942-gfx1100-gfx1101-gfx1102-gfx1200-gfx1201-rocm7.0" >> "$GITHUB_OUTPUT"
