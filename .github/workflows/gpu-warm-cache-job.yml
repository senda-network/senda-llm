name: GPU warm cache job

on:
  workflow_call:
    inputs:
      job_name:
        required: true
        type: string
      cache_label:
        required: true
        type: string
      container_image:
        required: true
        type: string
      llama_sha:
        required: true
        type: string
      cache_key:
        required: true
        type: string
      build_recipe:
        required: true
        type: string
      build_args:
        required: false
        type: string
        default: ''
      extra_env:
        required: false
        type: string
        default: ''
      runs_on:
        required: false
        type: string
        default: '"ubuntu-latest"'

permissions:
  actions: read
  contents: read

env:
  CACHE_NAMESPACE: senda

jobs:
  warm_cache:
    name: ${{ inputs.job_name }}
    runs-on: ${{ fromJson(inputs.runs_on) }}
    container:
      image: ${{ inputs.container_image }}

    steps:
      - name: Install base packages
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            python3
          rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            senda/ui/package-lock.json

      - name: Build UI
        working-directory: senda/ui
        shell: bash
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Use resolved llama.cpp upstream SHA
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ inputs.llama_sha }}" ]]; then
            echo "Reusable GPU warm-cache workflow received an empty llama_sha input" >&2
            exit 1
          fi
          echo "Using llama.cpp upstream SHA: ${{ inputs.llama_sha }}"

      - name: Restore llama.cpp ${{ inputs.cache_label }} build
        id: llama_cache
        uses: actions/cache/restore@v5
        with:
          path: llama.cpp/build/bin
          key: ${{ inputs.cache_key }}

      - name: Short-circuit if ${{ inputs.cache_label }} cache already warm
        if: steps.llama_cache.outputs.cache-hit == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "✓ llama.cpp ${{ inputs.cache_label }} cache already warm for SHA ${{ inputs.llama_sha }}"
          ls -lh llama.cpp/build/bin/ | head -20

      - name: Build ${{ inputs.cache_label }} backend (full build)
        if: steps.llama_cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          SENDA_LLAMA_PIN_SHA: ${{ inputs.llama_sha }}
          BUILD_RECIPE: ${{ inputs.build_recipe }}
          BUILD_ARGS: ${{ inputs.build_args }}
          EXTRA_ENV: ${{ inputs.extra_env }}
        run: |
          set -euo pipefail
          if [[ -n "$EXTRA_ENV" ]]; then
            while IFS= read -r line; do
              [[ -z "$line" ]] && continue
              export "$line"
            done <<< "$EXTRA_ENV"
          fi
          if [[ -n "$BUILD_ARGS" ]]; then
            read -r -a build_args <<< "$BUILD_ARGS"
            just --shell bash --shell-arg -lc "$BUILD_RECIPE" "${build_args[@]}"
          else
            just --shell bash --shell-arg -lc "$BUILD_RECIPE"
          fi

      - name: Verify ${{ inputs.cache_label }} binaries are present
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d llama.cpp/build/bin ]]; then
            echo "ERROR: llama.cpp/build/bin is missing after build" >&2
            exit 1
          fi
          ls -lh llama.cpp/build/bin/

      - name: Save llama.cpp ${{ inputs.cache_label }} build
        if: steps.llama_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: llama.cpp/build/bin
          key: ${{ steps.llama_cache.outputs.cache-primary-key }}

      - name: Verify llama.cpp ${{ inputs.cache_label }} cache write
        if: steps.llama_cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v5
        with:
          path: llama.cpp/build/bin
          key: ${{ steps.llama_cache.outputs.cache-primary-key }}
          lookup-only: true
          fail-on-cache-miss: true

      - name: Verify llama.cpp ${{ inputs.cache_label }} cache is visible on main
        if: ${{ github.ref == 'refs/heads/main' && steps.llama_cache.outputs.cache-hit != 'true' }}
        uses: actions/github-script@v8
        env:
          EXPECTED_KEY: ${{ steps.llama_cache.outputs.cache-primary-key }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const key = process.env.EXPECTED_KEY;
            const ref = 'refs/heads/main';
            const attempts = 6;
            const delayMs = 30000;

            for (let attempt = 1; attempt <= attempts; attempt += 1) {
              const { data } = await github.request(
                'GET /repos/{owner}/{repo}/actions/caches',
                {
                  owner,
                  repo,
                  key,
                  ref,
                  per_page: 100,
                },
              );

              const matches = data.actions_caches || [];
              core.notice(
                `Main visibility probe ${attempt}/${attempts} for ${key}: ${matches.length} match(es)`
              );

              if (matches.length > 0) {
                const cache = matches[0];
                core.notice(
                  `Visible on ${ref}: id=${cache.id} size=${cache.size_in_bytes} created_at=${cache.created_at}`
                );
                return;
              }

              if (attempt < attempts) {
                await new Promise((resolve) => setTimeout(resolve, delayMs));
              }
            }

            core.setFailed(
              `Warmed cache ${key} never became visible on ${ref} within ${attempts * delayMs / 1000}s`
            );
