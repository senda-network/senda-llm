            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            python3
          rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5

      - name: Benchmark gate
        id: benchmark_gate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ needs.changes.outputs.benchmarks }}" == "true" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: taiki-e/install-action@just
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}

      - uses: actions/setup-node@v5
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            senda/ui/package-lock.json

      - name: Build UI
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
        working-directory: senda/ui
        shell: bash
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}

      - uses: mozilla-actions/sccache-action@v0.0.9
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}

      - uses: Swatinem/rust-cache@v2
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}
          save-if: ${{ github.ref == 'refs/heads/main' }}


      - name: Restore llama.cpp ROCm cache
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
        id: llama_rocm_cache
        uses: actions/cache/restore@v5
        with:
          path: llama.cpp/build/bin
          key: ${{ needs.resolve_llama_cache_keys.outputs.rocm_slim_cache_key }}

      # This lane is compile-only plus a CLI smoke check (`--version`/`--help`).
      # It does not exercise ROCm inference on real AMD hardware, so restrict
      # the build to one representative target instead of compiling the full
      # default AMDGPU target matrix.
      - name: Build Linux ROCm backend (cache miss — full llama.cpp build)
        if: ${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true') && steps.llama_rocm_cache.outputs.cache-hit != 'true' }}
        shell: bash
        env:
          SENDA_LLAMA_PIN_SHA: ${{ needs.resolve_llama_cache_keys.outputs.sha }}
        run: |
          just --shell bash --shell-arg -lc release-build-rocm gfx1100

      - name: Build senda binary only (cache hit — llama.cpp skipped)
        if: ${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true') && steps.llama_rocm_cache.outputs.cache-hit == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "✓ llama.cpp ROCm build restored from cache (SHA ${{ needs.resolve_llama_cache_keys.outputs.sha }})"
          if [[ ! -d llama.cpp/build/bin ]]; then
            echo "ERROR: cache hit but llama.cpp/build/bin is missing" >&2
            exit 1
          fi
          if ! find llama.cpp/build/bin -maxdepth 1 -type f | grep -q .; then
            echo "ERROR: cache hit but llama.cpp/build/bin contains no cached binaries" >&2
            exit 1
          fi
          ls -lh llama.cpp/build/bin/ | head -20
          cargo build --release --locked -p senda --bin senda
          ls -lh target/release/senda

      - name: CLI smoke test
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
        shell: bash
        run: |
          target/release/senda --version
          target/release/senda --help | head -5

      - name: Build ROCm benchmark binary
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.benchmarks == 'true' }}
        shell: bash
        run: |
          mkdir -p target/release
          hipcc -O3 -std=c++17 -o target/release/membench-fingerprint-hip senda/benchmarks/membench-fingerprint.hip

      - name: Upload ROCm benchmark artifact
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.benchmarks == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: ci-benchmark-hip
          path: target/release/membench-fingerprint-hip
          if-no-files-found: error

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  macos_benchmark_smoke:
    needs: [macos]
    if: ${{ needs.macos.result == 'success' && needs.macos.outputs.benchmark_artifact_ready == 'true' }}
    name: macOS benchmark smoke
    uses: ./.github/workflows/benchmark-smoke.yml
    with:
      artifact_name: ci-benchmark-swift
      artifact_path: ci-artifacts/swift-benchmark
      benchmark_binary: membench-fingerprint
      runs_on: '["macos-latest"]'

  linux_cuda_benchmark_smoke:
    needs: [linux_cuda]
    if: ${{ needs.linux_cuda.result == 'success' && needs.linux_cuda.outputs.benchmark_artifact_ready == 'true' && vars.CUDA_BENCHMARK_RUNNER != '' }}
    name: Linux CUDA benchmark smoke
    uses: ./.github/workflows/benchmark-smoke.yml
    with:
      artifact_name: ci-benchmark-cuda
      artifact_path: ci-artifacts/cuda-benchmark
      benchmark_binary: membench-fingerprint-cuda
      runs_on: ${{ vars.CUDA_BENCHMARK_RUNNER || '["ubuntu-latest"]' }}
      container_image: nvidia/cuda:${{ vars.CUDA_VERSION || '12.8.0' }}-devel-ubuntu22.04
      container_options: --gpus all

  linux_rocm_benchmark_smoke:
    needs: [linux_rocm]
    if: ${{ needs.linux_rocm.result == 'success' && needs.linux_rocm.outputs.benchmark_artifact_ready == 'true' && vars.ROCM_BENCHMARK_RUNNER != '' }}
    name: Linux ROCm benchmark smoke
    uses: ./.github/workflows/benchmark-smoke.yml
    with:
      artifact_name: ci-benchmark-hip
      artifact_path: ci-artifacts/hip-benchmark
      benchmark_binary: membench-fingerprint-hip
      runs_on: ${{ vars.ROCM_BENCHMARK_RUNNER || '["ubuntu-latest"]' }}
      container_image: rocm/dev-ubuntu-24.04:7.0-complete
      container_options: --device /dev/kfd --device /dev/dri --group-add video --ipc=host --cap-add=SYS_PTRACE --security-opt seccomp=unconfined

  linux_vulkan:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
    name: Linux Vulkan
    runs-on: ubuntu-latest

    steps:
      - name: Install Vulkan build packages
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            libvulkan-dev \
            glslc \
            spirv-headers \
            python3
          sudo rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            senda/ui/package-lock.json

      - name: Build UI
        working-directory: senda/ui
        shell: bash
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Build Linux Vulkan backend
        shell: bash
        run: |
          just --shell bash --shell-arg -lc release-build-vulkan

      - name: CLI smoke test
        shell: bash
        run: |
          target/release/senda --version
          target/release/senda --help | head -5

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  # Windows CI builds disabled for now. Keep release.yml and ci.yml aligned so
  # Windows stays an explicit opt-in until the workflow is intentionally restored.
