name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CACHE_NAMESPACE: senda
  # Tiny model for integration tests (~138MB Q8_0, has chat template)
  MODEL_URL: https://huggingface.co/unsloth/SmolLM2-135M-Instruct-GGUF/resolve/main/SmolLM2-135M-Instruct-Q8_0.gguf
  MODEL_FILE: SmolLM2-135M-Instruct-Q8_0.gguf
  # Small MoE model for MoE split tests (~598MB Q2_K, qwen35moe architecture)
  MOE_MODEL_URL: https://huggingface.co/Flexan/kshitijthakkar-qwen3.5-moe-0.87B-d0.8B-GGUF/resolve/main/qwen3.5-moe-0.87B-d0.8B.Q2_K.gguf
  MOE_MODEL_FILE: qwen3.5-moe-0.87B-d0.8B-Q2_K.gguf
  SCCACHE_GHA_ENABLED: "true"

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      ui: ${{ steps.filter.outputs.ui }}
      benchmarks: ${{ steps.filter.outputs.benchmarks }}
      sdk: ${{ steps.filter.outputs.sdk }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'senda/src/**'
              - 'senda/build.rs'
              - 'senda/plugin/**'
              - 'senda/tests/**'
              - 'senda/proto/**'
              - 'tools/xtask/**'
              - 'senda/Cargo.toml'
              - 'senda/Cargo.lock'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Justfile'
              - 'scripts/**'
              - '.github/cache-version.txt'
              - '.github/workflows/ci.yml'
              - '.github/workflows/warm-caches.yml'
              - '.github/workflows/gpu-warm-cache-job.yml'
              - '.github/workflows/llama-cache-keys.yml'
              - '.github/workflows/smoke.yml'
            benchmarks:
              - 'senda/benchmarks/**'
              - '.github/workflows/ci.yml'
            ui:
              - 'senda/ui/**'
            sdk:
              - 'mesh-api/**'
              - 'mesh-api-ffi/**'
              - 'senda-client/**'
              - 'sdk/**'
              - 'Package.swift'
              - 'scripts/ci-native-sdk-smoke.sh'
              - 'scripts/ci-kotlin-sdk-smoke.sh'
              - 'scripts/ci-swift-sdk-smoke.sh'
              - 'scripts/ci-sdk-fixture.sh'
              - '.github/workflows/ci.yml'

  resolve_llama_cache_keys:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.benchmarks == 'true' }}
    uses: ./.github/workflows/llama-cache-keys.yml

  linux:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # ── UI ──
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            senda/ui/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            .github/cache-version.txt
            ci/requirements-ci-python.txt

      - name: Build UI
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.ui == 'true' }}
        working-directory: senda/ui
        run: npm ci && npm run build

      - name: Test UI
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.ui == 'true' }}
        working-directory: senda/ui
        run: npm test

      - name: Install Python SDKs
        run: python -m pip install --upgrade pip -r ci/requirements-ci-python.txt

      # ── System dependencies ──
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev

      # ── Rust ──
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: mozilla-actions/sccache-action@v0.0.9

      # Workspace `. -> target` because the cargo workspace is at repo root
      # (`Cargo.toml` members = ["senda", ...]) and cargo writes to
      # `./target/`, NOT `senda/target/`. Using `workspaces: senda`
      # silently caches an empty dir and gives zero PR cache hits — we
      # measured a 4-minute regression from this exact misconfiguration.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Early-fail gate: runs before expensive compile/test work.
      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check release-target repo consistency
        run: cargo run -p xtask -- repo-consistency release-targets

      - name: Check embedded client dependency purity
        run: |
          cargo tree -p senda-client --prefix=none --no-dedupe > /tmp/mesh-client-deps.txt
          FORBIDDEN="keyring|rpassword|hf-hub|dirs|clap|include_dir|rmcp|keyring-core"
          if grep -E "^[[:space:]│├└─-]*($FORBIDDEN)([[:space:]]|$)" /tmp/mesh-client-deps.txt; then
            echo "ERROR: Forbidden dependency found in mesh-client"
            grep -E "^[[:space:]│├└─-]*($FORBIDDEN)([[:space:]]|$)" /tmp/mesh-client-deps.txt
            exit 1
          fi
          echo "PASS: No forbidden dependencies found"

      # Build in dev/debug profile, NOT release. Two reasons:
      #  1. Build + Unit tests steps share one target/ subdir and one
      #     incremental cache — zero duplicated codegen.
      #  2. debug has `incremental = true`; release has `incremental = false`.
      #     Warm rebuild after a lib edit: release ~43s, debug ~4s (M4 Pro).
      # senda is a thin orchestrator around llama-server; the hot loop is
      # inside llama-server C++, so debug vs release binary perf is
      # negligible for smoke tests. Integration steps below use target/debug.
      - name: Build senda binary (debug)
        run: cargo build -p senda --bin senda

      - name: Unit tests
        run: cargo test --lib --tests

      - name: Protocol compatibility matrix
        run: |
          cargo test -p senda --test protocol_compat_v0_client
          cargo test -p senda --test protocol_convert_matrix

      - name: Clippy
        working-directory: senda
        run: cargo clippy -- -D warnings || true

      # ── llama.cpp (CPU-only for CI) ──
      - name: Prepare patched llama.cpp
        run: |
          scripts/prepare-llama.sh pinned

      - name: Build llama.cpp (CPU + RPC)
        run: |
          CACHE_FLAGS=()
          if command -v sccache >/dev/null 2>&1; then
            CACHE_FLAGS+=(
              -DCMAKE_C_COMPILER_LAUNCHER=sccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
            )
          fi
          cmake -B llama.cpp/build -S llama.cpp \
            -DGGML_METAL=OFF \
            -DGGML_CUDA=OFF \
            -DGGML_NATIVE=OFF \
            -DGGML_RPC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_OPENSSL=OFF \
            "${CACHE_FLAGS[@]}"
          cmake --build llama.cpp/build --config Release -j$(nproc) --target rpc-server llama-server llama-moe-analyze llama-moe-split

      - name: CLI smoke test
        run: |
          target/debug/senda --version
          target/debug/senda --help | head -5

      - name: Client-auto boot test
        run: scripts/ci-client-auto-test.sh target/debug/senda

      - name: Upload Linux inference binaries
        uses: actions/upload-artifact@v6
        with:
          name: ci-linux-inference-binaries
          path: |
            target/debug/senda
            llama.cpp/build/bin/rpc-server
            llama.cpp/build/bin/llama-server
            llama.cpp/build/bin/llama-moe-analyze
            llama.cpp/build/bin/llama-moe-split
          if-no-files-found: error

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  inference_smoke_tests:
    needs: linux
    if: ${{ needs.linux.result == 'success' }}
    uses: ./.github/workflows/smoke.yml
    with:
      artifact_name: ci-linux-inference-binaries
      mesh_binary_target: target/debug/senda
      cache_key_prefix: ''
      workflow_cache_file: .github/workflows/ci.yml

  native_sdk_smoke:
    needs: [changes, linux, inference_smoke_tests]
    if: ${{ needs.inference_smoke_tests.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.sdk == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Download Linux inference binaries
        uses: actions/download-artifact@v7
        with:
          name: ci-linux-inference-binaries
          path: ci-artifacts/linux

      - name: Stage binaries for native SDK smoke
        run: |
          mkdir -p target/debug llama.cpp/build/bin
          cp ci-artifacts/linux/target/debug/senda target/debug/senda
          cp ci-artifacts/linux/llama.cpp/build/bin/rpc-server llama.cpp/build/bin/rpc-server
          cp ci-artifacts/linux/llama.cpp/build/bin/llama-server llama.cpp/build/bin/llama-server
          chmod +x target/debug/senda llama.cpp/build/bin/rpc-server llama.cpp/build/bin/llama-server

      - name: Cache integration model
        id: cache-model-native-sdk
        uses: actions/cache@v5
        with:
          path: ~/.models/${{ env.MODEL_FILE }}
          key: ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-model-${{ env.MODEL_FILE }}-${{ hashFiles('.github/cache-version.txt', '.github/workflows/ci.yml') }}

      - name: Download integration model
        if: steps.cache-model-native-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.models
          curl -fSL "$MODEL_URL" -o ~/.models/$MODEL_FILE
          ls -lh ~/.models/$MODEL_FILE

      - name: Native SDK smoke test
        run: |
          scripts/ci-native-sdk-smoke.sh \
            target/debug/senda \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

  kotlin_sdk_smoke:
    needs: [changes, linux, inference_smoke_tests]
    if: ${{ needs.inference_smoke_tests.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.sdk == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Download Linux inference binaries
        uses: actions/download-artifact@v7
        with:
          name: ci-linux-inference-binaries
          path: ci-artifacts/linux

      - name: Stage binaries for Kotlin SDK smoke
        run: |
          mkdir -p target/debug llama.cpp/build/bin
          cp ci-artifacts/linux/target/debug/senda target/debug/senda
          cp ci-artifacts/linux/llama.cpp/build/bin/rpc-server llama.cpp/build/bin/rpc-server
          cp ci-artifacts/linux/llama.cpp/build/bin/llama-server llama.cpp/build/bin/llama-server
          chmod +x target/debug/senda llama.cpp/build/bin/rpc-server llama.cpp/build/bin/llama-server

      - name: Cache integration model
        id: cache-model-kotlin-sdk
        uses: actions/cache@v5
        with:
          path: ~/.models/${{ env.MODEL_FILE }}
          key: ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-model-${{ env.MODEL_FILE }}-${{ hashFiles('.github/cache-version.txt', '.github/workflows/ci.yml') }}

      - name: Download integration model
        if: steps.cache-model-kotlin-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.models
          curl -fSL "$MODEL_URL" -o ~/.models/$MODEL_FILE
          ls -lh ~/.models/$MODEL_FILE

      - name: Kotlin SDK smoke test
        run: |
          scripts/ci-kotlin-sdk-smoke.sh \
            target/debug/senda \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

  swift_sdk_smoke:
    needs: [changes, inference_smoke_tests]
    if: ${{ needs.inference_smoke_tests.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.sdk == 'true') }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Build senda binary (debug)
        run: cargo build -p senda --bin senda

      - name: Prepare patched llama.cpp
        run: |
          scripts/prepare-llama.sh pinned

      - name: Build llama.cpp (CPU + RPC)
        run: |
          CACHE_FLAGS=()
          if command -v sccache >/dev/null 2>&1; then
            CACHE_FLAGS+=(
              -DCMAKE_C_COMPILER_LAUNCHER=sccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
            )
          fi
          cmake -B llama.cpp/build -S llama.cpp \
            -DGGML_METAL=OFF \
            -DGGML_NATIVE=OFF \
            -DGGML_RPC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_OPENSSL=OFF \
            "${CACHE_FLAGS[@]}"
          cmake --build llama.cpp/build --config Release -j$(sysctl -n hw.ncpu) --target rpc-server llama-server

      - name: Cache integration model
        id: cache-model-swift-sdk
        uses: actions/cache@v5
        with:
          path: ~/.models/${{ env.MODEL_FILE }}
          key: ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-model-${{ env.MODEL_FILE }}-${{ hashFiles('.github/cache-version.txt', '.github/workflows/ci.yml') }}

      - name: Download integration model
        if: steps.cache-model-swift-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.models
          curl -fSL "$MODEL_URL" -o ~/.models/$MODEL_FILE
          ls -lh ~/.models/$MODEL_FILE

      - name: Swift SDK smoke test
        run: |
          scripts/ci-swift-sdk-smoke.sh \
            target/debug/senda \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

  macos:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' || needs.changes.outputs.benchmarks == 'true' }}
    runs-on: macos-latest
    outputs:
      benchmark_artifact_ready: ${{ steps.benchmark_gate.outputs.ready }}
    steps:
      - uses: actions/checkout@v5

      - name: Benchmark gate
        id: benchmark_gate
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ needs.changes.outputs.benchmarks }}" == "true" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      # ── UI ──
      - uses: actions/setup-node@v5
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            senda/ui/package-lock.json

      - name: Build UI
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.ui == 'true' }}
        working-directory: senda/ui
        run: npm ci && npm run build

      - name: Test UI
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.ui == 'true' }}
        working-directory: senda/ui
        run: npm test

      # ── Rust ──
      - uses: dtolnay/rust-toolchain@stable
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}

      - uses: mozilla-actions/sccache-action@v0.0.9
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}

      # See linux job for explanation of `. -> target`.
      - uses: Swatinem/rust-cache@v2
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
        with:
          workspaces: . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Early-fail gate: runs before expensive compile/test work.
      - name: Check formatting
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
        run: cargo fmt --all -- --check

      # See linux job for rationale on building in dev/debug, not release.
      - name: Build senda binary (debug)
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
        run: cargo build -p senda --bin senda

      - name: Unit tests
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
        run: cargo test -p senda --lib --tests

      # ── llama.cpp (Metal + RPC) ──
      - name: Prepare patched llama.cpp
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
        run: |
          scripts/prepare-llama.sh pinned

      - name: Build llama.cpp (CPU + RPC)
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
        run: |
          CACHE_FLAGS=()
          if command -v sccache >/dev/null 2>&1; then
            CACHE_FLAGS+=(
              -DCMAKE_C_COMPILER_LAUNCHER=sccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
            )
          fi
          cmake -B llama.cpp/build -S llama.cpp \
            -DGGML_METAL=OFF \
            -DGGML_NATIVE=OFF \
            -DGGML_RPC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_OPENSSL=OFF \
            "${CACHE_FLAGS[@]}"
          cmake --build llama.cpp/build --config Release -j$(sysctl -n hw.ncpu) --target rpc-server llama-server llama-moe-analyze llama-moe-split

      # ── Download model ──
      - name: Cache model
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
        id: cache-model
        uses: actions/cache/restore@v5
        with:
          path: ~/.models/${{ env.MODEL_FILE }}
          key: ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-model-${{ env.MODEL_FILE }}-${{ hashFiles('.github/cache-version.txt', '.github/workflows/ci.yml') }}

      - name: Download model
        if: ${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true') && steps.cache-model.outputs.cache-hit != 'true' }}
        run: |
          mkdir -p ~/.models
          curl -fSL "$MODEL_URL" -o ~/.models/$MODEL_FILE
          ls -lh ~/.models/$MODEL_FILE

      - name: Save model cache
        if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true') && steps.cache-model.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: ~/.models/${{ env.MODEL_FILE }}
          key: ${{ steps.cache-model.outputs.cache-primary-key }}

      # ── Integration smoke test ──
      - name: Smoke test (real inference)
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
        run: |
          scripts/ci-smoke-test.sh \
            target/debug/senda \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      # Same smoke with speculative decoding turned on. Catches drift in
      # llama.cpp's `--spec-draft-*` flag surface (May 2026: upstream
      # removed `--draft-max`, runtime kept emitting it, every install
      # with a draft model stuck at `loading` forever).
      - name: Smoke test (with speculative decoding)
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
        run: |
          # `~` is not expanded inside GHA `env:` values, so set the env
          # var here in the run script where bash does the expansion.
          export SENDA_DRAFT_MODEL="$HOME/.models/$MODEL_FILE"
          scripts/ci-smoke-test.sh \
            target/debug/senda \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      - name: Split-mode test (host/worker routing)
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
        run: |
          scripts/ci-split-test.sh \
            target/debug/senda \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      # ── MoE split test ──
      - name: Cache MoE model
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
        id: cache-moe-model
        uses: actions/cache/restore@v5
        with:
          path: ~/.models/${{ env.MOE_MODEL_FILE }}
          key: ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-model-${{ env.MOE_MODEL_FILE }}-${{ hashFiles('.github/cache-version.txt', '.github/workflows/ci.yml') }}

      - name: Download MoE model
        if: ${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true') && steps.cache-moe-model.outputs.cache-hit != 'true' }}
        run: |
          mkdir -p ~/.models
          curl -fSL "$MOE_MODEL_URL" -o ~/.models/$MOE_MODEL_FILE
          ls -lh ~/.models/$MOE_MODEL_FILE

      - name: Save MoE model cache
        if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true') && steps.cache-moe-model.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: ~/.models/${{ env.MOE_MODEL_FILE }}
          key: ${{ steps.cache-moe-model.outputs.cache-primary-key }}

      - name: MoE split test (expert sharding)
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
        run: |
          scripts/ci-moe-split-test.sh \
            llama.cpp/build/bin \
            ~/.models/$MOE_MODEL_FILE

      - name: MoE mesh test (expert sharding end-to-end)
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
        run: |
          scripts/ci-moe-mesh-test.sh \
            target/debug/senda \
            llama.cpp/build/bin \
            ~/.models/$MOE_MODEL_FILE

      - name: Virtual LLM hook test
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
        run: cargo test -p senda --test virtual_llm_injection -- --nocapture
        timeout-minutes: 5

      - name: CLI smoke test
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
        run: |
          target/debug/senda --version
          target/debug/senda --help | head -5

      - name: Client-auto boot test
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
        run: scripts/ci-client-auto-test.sh target/debug/senda

      - name: Build Swift benchmark binary
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.benchmarks == 'true' }}
        run: |
          mkdir -p target/release
          swiftc -O senda/benchmarks/membench-fingerprint.swift -o target/release/membench-fingerprint

      - name: Upload Swift benchmark artifact
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.benchmarks == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: ci-benchmark-swift
          path: target/release/membench-fingerprint
          if-no-files-found: error

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  linux_cuda:
    needs: [changes, resolve_llama_cache_keys]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.benchmarks == 'true' }}
    name: Linux CUDA slim
    runs-on: ubuntu-latest
    container:
      # CUDA_VERSION is a repository Actions variable and the single source of truth
      # for both workflow CUDA image tags and warm-cache key suffixes.
      # It should contain the exact CUDA tag version fragment to use.
      image: nvidia/cuda:${{ needs.resolve_llama_cache_keys.outputs.cuda_version }}-devel-ubuntu22.04
    outputs:
      benchmark_artifact_ready: ${{ steps.benchmark_gate.outputs.ready }}

    steps:
      - name: Install base packages
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            python3
          rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5

      - name: Benchmark gate
        id: benchmark_gate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ needs.changes.outputs.benchmarks }}" == "true" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: taiki-e/install-action@just
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}

      - uses: actions/setup-node@v5
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            senda/ui/package-lock.json

      - name: Build UI
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
        working-directory: senda/ui
        shell: bash
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}

      - uses: mozilla-actions/sccache-action@v0.0.9
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}

      - uses: Swatinem/rust-cache@v2
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # ── Cross-PR llama.cpp / CUDA slim artifact cache (read-only consumer) ──
      #
      # Goal: every PR gets a "warm" llama.cpp CUDA build for free. Without
      # this cache the CUDA job pays ~194s warm (sccache hit) or ~26m cold
      # (sccache eviction) on every PR. With it, the llama.cpp build is
      # skipped entirely on cache hit and the only remaining work is the
      # senda cargo build.
      #
      # This job RESTORES ONLY. It never writes the cache. All writes
      # happen in .github/workflows/warm-caches.yml, which runs on push
      # to main (paths-filtered) and on workflow_dispatch. Splitting the
      # writer into its own workflow prevents PR runs from polluting
      # PR-scoped cache storage with a ~500 MB `llama.cpp/build/bin`
      # entry on every push, and lets the warmup workflow prune old
      # versions (see warm-caches.yml for the retention policy).
      #
      # This restore step consumes the exact key rendered by
      # .github/workflows/llama-cache-keys.yml via
      # `needs.resolve_llama_cache_keys.outputs.cuda_slim_cache_key`.
      # That reusable workflow is the single source of truth for key
      # composition, and warm-caches.yml consumes the same shared outputs.
      #
      # Cross-branch read: pushes to `main` write the cache under
      # `refs/heads/main`. PR runs on `refs/pull/<N>/merge` automatically
      # fall back to the base branch's cache scope, so PRs hit the
      # main-warmed cache without needing any cache to exist on the PR
      # ref itself.
      #
      # The shared workflow resolves the upstream llama.cpp SHA, computes the
      # relevant hashFiles() inputs, and renders the CUDA/ROCm slim/fat keys.
      # If cache-key inputs change, update llama-cache-keys.yml rather than
      # re-inlining key construction in this caller.
      # `actions/cache/restore@v5` (NOT `actions/cache@v5`): restore-only,
      # never saves. PR runs on `refs/pull/<N>/merge` never write anything
      # to PR-scoped cache storage. The only writer is warm-caches.yml.
      # On cache miss the full llama.cpp build still runs to prove the
      # change works, but the result is discarded at job end.
      - name: Restore llama.cpp CUDA cache
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
        id: llama_cuda_cache
        uses: actions/cache/restore@v5
        with:
          path: llama.cpp/build/bin
          key: ${{ needs.resolve_llama_cache_keys.outputs.cuda_slim_cache_key }}

      # CI is a validation build only: we only need to prove CUDA compiles
      # and the Rust binary runs. User-facing release artifacts are produced
      # by release.yml which keeps the full default cuda_arch list, release
      # profile, and GGML_CUDA_FA_ALL_QUANTS=ON. Here we pass four CI-only
      # opt-outs, all documented in scripts/build-linux.sh:
      #   1. single cuda_arch 89 (Ada Lovelace) — ~3.7x faster llama.cpp build
      #   2. SENDA_BUILD_PROFILE=dev — debug profile for senda itself
      #   3. SENDA_CUDA_FA_ALL_QUANTS=off — skip the full FlashAttention
      #      kernel matrix. Safe ONLY because the CUDA smoke test is
      #      `senda --version` — the asymmetric K/V cache path that would
      #      crash rpc-server with BEST_FATTN_KERNEL_NONE is never exercised.
      #      NEVER set this in release.yml.
      #   4. SENDA_LLAMA_PIN_SHA — pin the llama.cpp checkout to the SHA
      #      embedded in the artifact cache key (above). NEVER set this in
      #      release.yml; release artifacts must build the current
      #      master tip.
      #
      # Split into two mutually exclusive steps keyed off the artifact cache:
      #
      #   - Cache miss → do the fast PR-only llama.cpp + senda build via the
      #     build script. This validates the same arch89/fa-off shape that
      #     main warms, but PR runs never write the shared cache.
      #   - Cache hit  → skip llama.cpp entirely (we already proved it builds
      #     at this SHA + flag combo) and run only the senda cargo build.
      #     This is the warm path every PR hits when main has already run.
      - name: Build Linux CUDA backend (cache miss — full llama.cpp build)
        if: ${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true') && steps.llama_cuda_cache.outputs.cache-hit != 'true' }}
        shell: bash
        env:
          SENDA_BUILD_PROFILE: dev
          SENDA_CUDA_FA_ALL_QUANTS: off
          SENDA_LLAMA_PIN_SHA: ${{ needs.resolve_llama_cache_keys.outputs.sha }}
          SENDA_LLAMA_TARGETS: "rpc-server llama-server llama-moe-analyze llama-moe-split"
        run: |
          just --shell bash --shell-arg -lc release-build-cuda 89

      - name: Build senda binary only (cache hit — llama.cpp skipped)
        if: ${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true') && steps.llama_cuda_cache.outputs.cache-hit == 'true' }}
        shell: bash
        env:
          SENDA_BUILD_PROFILE: dev
        run: |
          set -euo pipefail
          echo "✓ llama.cpp CUDA build restored from cache (SHA ${{ needs.resolve_llama_cache_keys.outputs.sha }})"
          if [[ ! -d llama.cpp/build/bin ]]; then
            echo "ERROR: cache hit but llama.cpp/build/bin is missing" >&2
            exit 1
          fi
          if ! find llama.cpp/build/bin -maxdepth 1 -type f | grep -q .; then
            echo "ERROR: cache hit but llama.cpp/build/bin contains no cached binaries" >&2
            exit 1
          fi
          ls -lh llama.cpp/build/bin/ | head -20
          cargo build -p senda --bin senda
          ls -lh target/debug/senda

      - name: CLI smoke test
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
        shell: bash
        run: |
          target/debug/senda --version
          target/debug/senda --help | head -5

      - name: Build CUDA benchmark binary
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.benchmarks == 'true' }}
        shell: bash
        run: |
          mkdir -p target/release
          nvcc -O3 -o target/release/membench-fingerprint-cuda senda/benchmarks/membench-fingerprint.cu

      - name: Upload CUDA benchmark artifact
        if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.benchmarks == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: ci-benchmark-cuda
          path: target/release/membench-fingerprint-cuda
          if-no-files-found: error

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  linux_rocm:
    needs: [changes, resolve_llama_cache_keys]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.benchmarks == 'true' }}
    name: Linux ROCm slim
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-24.04:7.0-complete
    outputs:
      benchmark_artifact_ready: ${{ steps.benchmark_gate.outputs.ready }}

    steps:
      - name: Install base packages
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
