<svg width="440" height="96" viewBox="0 0 440 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Senda logo">
  <title>Senda</title>

  <!-- Leaf mark: a leaf whose midrib and veins branch like routes across a
       network, with three waypoint nodes at the vein tips — the paths a
       session takes across peers in the mesh. Mirrors app/components/Logo.tsx
       in the senda web repo. Light-theme variant. -->
  <g transform="translate(6 15.2) scale(2.7)">
    <path d="M10.5 21.5 C 3.6 16.8 4.6 7.4 14.4 2.8 C 18.7 8.6 17.1 17.3 10.5 21.5 Z"
          fill="#1a9d5f"/>
    <path d="M10.5 20.3 C 12.2 15 12 8.5 14 4"
          fill="none" stroke="#ffffff" stroke-width="1.05" stroke-linecap="round" opacity="0.9"/>
    <path d="M11.7 16 L15.3 13.8 M12.4 11.5 L16 9.2 M12 13.8 L8.2 12 M12.6 9 L9.2 7.2"
          fill="none" stroke="#ffffff" stroke-width="1" stroke-linecap="round" opacity="0.85"/>
    <circle cx="14" cy="3.8" r="0.9" fill="#ffffff"/>
    <circle cx="16" cy="9.2" r="0.9" fill="#ffffff"/>
    <circle cx="8.2" cy="12" r="0.9" fill="#ffffff"/>
  </g>

  <text x="96" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="700" letter-spacing="-1" fill="#11201a">Senda</text>
  <text x="98" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#55655c" letter-spacing="0.2">Open peer-to-peer LLM</text>
</svg>
