<svg width="440" height="96" viewBox="0 0 440 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Senda logo">
  <title>Senda</title>

  <!-- S-path mark: a trail that curves into an S with waypoint nodes — the
       route a session takes across peers in the mesh. Mirrors
       app/components/Logo.tsx in the senda web repo. -->
  <g transform="translate(8 11) scale(3.0)">
    <path d="M16.2 6.5 C13 4.4 8.4 5.2 8.4 9 C8.4 12.4 15.6 11.6 15.6 15 C15.6 18.8 11 19.6 7.8 17.5"
          fill="none" stroke="#1a9d5f" stroke-width="1.9" stroke-linecap="round" stroke-opacity="0.55"/>
    <circle cx="16.2" cy="6.5" r="2.05" fill="#1a9d5f"/>
    <circle cx="7.8" cy="17.5" r="2.05" fill="#1a9d5f"/>
    <circle cx="12" cy="12" r="1.6" fill="#1a9d5f"/>
  </g>

  <text x="96" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="700" letter-spacing="-1" fill="#11201a">Senda</text>
  <text x="98" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#55655c" letter-spacing="0.2">Open peer-to-peer LLM</text>
</svg>
