    <circle cx="4" cy="18" r="2.2" fill="#ff7a45"/>
    <circle cx="20" cy="18" r="2.2" fill="#ff7a45"/>
    <circle cx="12" cy="13" r="1.6" fill="#ededed" opacity="0.9"/>
    <path
